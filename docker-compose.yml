services:
  gensparx-gateway:
    image: ${GENSPARX_IMAGE:-gensparx:local}
    environment:
      HOME: /home/node
      TERM: xterm-256color
      GENSPARX_GATEWAY_TOKEN: ${GENSPARX_GATEWAY_TOKEN}
      GENSPARX_ALLOW_INSECURE_PRIVATE_WS: ${GENSPARX_ALLOW_INSECURE_PRIVATE_WS:-}
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${GENSPARX_CONFIG_DIR}:/home/node/.gensparx
      - ${GENSPARX_WORKSPACE_DIR}:/home/node/.gensparx/workspace
      ## Uncomment the lines below to enable sandbox isolation
      ## (agents.defaults.sandbox). Requires Docker CLI in the image
      ## (build with --build-arg GENSPARX_INSTALL_DOCKER_CLI=1) or use
      ## docker-setup.sh with GENSPARX_SANDBOX=1 for automated setup.
      ## Set DOCKER_GID to the host's docker group GID (run: stat -c '%g' /var/run/docker.sock).
      # - /var/run/docker.sock:/var/run/docker.sock
      # group_add:
      #   - "${DOCKER_GID:-999}"
    ports:
      - "${GENSPARX_GATEWAY_PORT:-18789}:18789"
      - "${GENSPARX_BRIDGE_PORT:-18790}:18790"
    init: true
    restart: unless-stopped
    command: [ "node", "dist/index.js", "gateway", "--bind", "${GENSPARX_GATEWAY_BIND:-lan}", "--port", "18789" ]
    healthcheck:
      test: [ "CMD", "node", "-e", "fetch('http://127.0.0.1:18789/healthz').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))" ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  gensparx-cli:
    image: ${GENSPARX_IMAGE:-gensparx:local}
    network_mode: "service:gensparx-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    environment:
      HOME: /home/node
      TERM: xterm-256color
      GENSPARX_GATEWAY_TOKEN: ${GENSPARX_GATEWAY_TOKEN}
      GENSPARX_ALLOW_INSECURE_PRIVATE_WS: ${GENSPARX_ALLOW_INSECURE_PRIVATE_WS:-}
      BROWSER: echo
      CLAUDE_AI_SESSION_KEY: ${CLAUDE_AI_SESSION_KEY:-}
      CLAUDE_WEB_SESSION_KEY: ${CLAUDE_WEB_SESSION_KEY:-}
      CLAUDE_WEB_COOKIE: ${CLAUDE_WEB_COOKIE:-}
    volumes:
      - ${GENSPARX_CONFIG_DIR}:/home/node/.gensparx
      - ${GENSPARX_WORKSPACE_DIR}:/home/node/.gensparx/workspace
    stdin_open: true
    tty: true
    init: true
    entrypoint: [ "node", "dist/index.js" ]
    depends_on:
      - gensparx-gateway
