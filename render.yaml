services:
  - type: web
    name: gensparx
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: GENSPARX_STATE_DIR
        value: /data/.gensparx
      - key: GENSPARX_WORKSPACE_DIR
        value: /data/workspace
      - key: GENSPARX_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: gensparx-data
      mountPath: /data
      sizeGB: 1
